<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 文章管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">📝 文章管理系统</h1>
      <h2 class="auth-subtitle">注册</h2>
      
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" required class="form-input" 
                 placeholder="3-20个字符" minlength="3" maxlength="20">
        </div>
        
        <div class="form-group">
          <label for="email">邮箱（可选）</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="用于找回密码">
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" required class="form-input" 
                 placeholder="至少6个字符" minlength="6">
        </div>
        
        <div class="form-group">
          <label for="password2">确认密码</label>
          <input type="password" id="password2" name="password2" required class="form-input" 
                 placeholder="再次输入密码">
        </div>
        
        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">注册</button>
        </div>
        
        <p class="auth-link">
          已有账号？<a href="login.html">立即登录</a>
        </p>
      </form>

      <div class="auth-footer">
        <a href="index.html">← 返回首页</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (!username || !password) {
        alert('请填写用户名和密码');
        return;
      }

      if (username.length < 3 || username.length > 20) {
        alert('用户名长度需在3-20个字符之间');
        return;
      }

      if (password.length < 6) {
        alert('密码长度至少6个字符');
        return;
      }

      if (password !== password2) {
        alert('两次密码输入不一致');
        return;
      }

      try {
        const res = await api.register(username, password, email);
        if (res.success) {
          alert('注册成功！请登录');
          window.location.href = 'login.html';
        } else {
          alert(res.error || '注册失败');
        }
      } catch (e) {
        alert('注册失败，请重试');
      }
    });
  </script>
</body>
</html>
