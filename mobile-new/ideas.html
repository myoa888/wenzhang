<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>创意管理</title>
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        .idea-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .idea-tag { font-size: 12px; padding: 2px 8px; background: var(--bg-color); border-radius: 4px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app">
        <div class="page active">
            <div class="page-header">
                <button class="back-btn" onclick="location.href='mobile.html'">‹ 返回</button>
                <h1 class="page-title">创意管理</h1>
                <button class="header-btn" onclick="showAddIdea()">+ 新建</button>
            </div>
            <div class="categories" id="idea-categories">
                <button class="category-tag active" data-category="all">全部</button>
                <button class="category-tag" data-category="产品">产品</button>
                <button class="category-tag" data-category="工具">工具</button>
                <button class="category-tag" data-category="内容">内容</button>
                <button class="category-tag" data-category="技术">技术</button>
            </div>
            <div class="content">
                <div id="ideas-list" class="article-list">
                    <!-- 创意列表 -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
    (function() {
        const STORAGE_KEY = 'wenzhang_ideas';
        let currentCategory = 'all';

        // 初始化模拟数据
        function initMockData() {
            const existing = localStorage.getItem(STORAGE_KEY);
            if (!existing) {
                const mockIdeas = [
                    { id: 1, title: '智能家居控制系统', category: '产品', excerpt: '用AI打造更智能、更便捷的家居体验', date: '3天前' },
                    { id: 2, title: '个人知识管理App', category: '工具', excerpt: '帮助用户高效管理和回顾所学知识', date: '1周前' },
                    { id: 3, title: '在线协作白板', category: '工具', excerpt: '支持多人实时协作的在线白板工具', date: '2周前' },
                    { id: 4, title: '短视频脚本生成器', category: '内容', excerpt: 'AI辅助创作短视频脚本，提高创作效率', date: '5天前' },
                    { id: 5, title: '开源博客平台', category: '技术', excerpt: '基于Markdown的轻量级博客系统', date: '3周前' },
                    { id: 6, title: '会员积分小程序', category: '产品', excerpt: '商家会员积分管理及营销工具', date: '1天前' }
                ];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(mockIdeas));
            }
        }

        // 获取创意列表
        function getIdeas() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        // 保存创意列表
        function saveIdeas(ideas) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
        }

        // 渲染创意列表
        function renderIdeas() {
            const container = document.getElementById('ideas-list');
            let ideas = getIdeas();

            // 按分类筛选
            if (currentCategory !== 'all') {
                ideas = ideas.filter(i => i.category === currentCategory);
            }

            if (ideas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💡</div>
                        <p>暂无${currentCategory === 'all' ? '' : currentCategory}创意</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = ideas.map(idea => `
                <div class="article-item" onclick="showIdeaDetail(${idea.id})">
                    <div class="article-title">${escapeHtml(idea.title)}</div>
                    <div class="article-meta">
                        <span class="article-category">${escapeHtml(idea.category)}</span>
                        <span>${idea.date}</span>
                    </div>
                    ${idea.excerpt ? `<div class="article-excerpt">${escapeHtml(idea.excerpt)}</div>` : ''}
                    ${idea.tags && idea.tags.length ? `
                        <div class="idea-tags">
                            ${idea.tags.map(t => `<span class="idea-tag">#${escapeHtml(t)}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 显示添加弹窗
        function showAddIdea() {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay show';
            overlay.innerHTML = `
                <div class="modal-content" style="padding:20px;">
                    <div class="modal-title">新建创意</div>
                    <div class="form-group">
                        <input type="text" id="idea-title-input" class="form-input" placeholder="创意标题">
                    </div>
                    <div class="form-group">
                        <select id="idea-category-input" class="form-input" style="padding:12px;">
                            <option value="产品">产品</option>
                            <option value="工具">工具</option>
                            <option value="内容">内容</option>
                            <option value="技术">技术</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea id="idea-content-input" class="form-input" placeholder="创意描述..." style="min-height:80px;resize:none;"></textarea>
                    </div>
                    <div class="modal-btn-group">
                        <button class="modal-btn modal-btn-cancel" onclick="this.closest('.modal-overlay').remove()">取消</button>
                        <button class="modal-btn modal-btn-confirm" onclick="saveNewIdea()">保存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        }

        // 保存新创意
        function saveNewIdea() {
            const title = document.getElementById('idea-title-input').value.trim();
            const category = document.getElementById('idea-category-input').value;
            const excerpt = document.getElementById('idea-content-input').value.trim();

            if (!title) {
                alert('请输入标题');
                return;
            }

            const ideas = getIdeas();
            ideas.unshift({
                id: Date.now(),
                title,
                category,
                excerpt,
                date: '刚刚'
            });
            saveIdeas(ideas);

            document.querySelector('.modal-overlay').remove();
            showToast('创意已保存');
            renderIdeas();
        }

        // 显示创意详情
        function showIdeaDetail(id) {
            const ideas = getIdeas();
            const idea = ideas.find(i => i.id === id);
            if (!idea) return;

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay show';
            overlay.innerHTML = `
                <div class="modal-content" style="padding:20px;max-width:90%;text-align:left;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <div class="modal-title" style="margin:0;">${escapeHtml(idea.title)}</div>
                        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;color:#8E8E93;">×</button>
                    </div>
                    <div style="font-size:13px;color:#8E8E93;margin-bottom:12px;">
                        <span class="article-category">${escapeHtml(idea.category)}</span> · ${idea.date}
                    </div>
                    <div style="font-size:15px;line-height:1.6;color:#333;">${escapeHtml(idea.excerpt || '暂无描述')}</div>
                    <div style="margin-top:16px;display:flex;gap:8px;">
                        <button class="modal-btn modal-btn-cancel" onclick="deleteIdea(${idea.id});this.closest('.modal-overlay').remove();" style="flex:1;">删除</button>
                        <button class="modal-btn modal-btn-confirm" onclick="this.closest('.modal-overlay').remove()" style="flex:1;">关闭</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        // 删除创意
        function deleteIdea(id) {
            if (!confirm('确定删除这个创意？')) return;
            let ideas = getIdeas();
            ideas = ideas.filter(i => i.id !== id);
            saveIdeas(ideas);
            showToast('已删除');
            renderIdeas();
        }

        // Toast 提示
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化分类切换
        function initCategories() {
            document.querySelectorAll('#idea-categories .category-tag').forEach(tag => {
                tag.onclick = () => {
                    document.querySelectorAll('#idea-categories .category-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    currentCategory = tag.dataset.category;
                    renderIdeas();
                };
            });
        }

        // 初始化
        initMockData();
        initCategories();
        renderIdeas();

        // 暴露到全局
        window.showIdeaDetail = showIdeaDetail;
        window.saveNewIdea = saveNewIdea;
        window.deleteIdea = deleteIdea;
    })();
    </script>
</body>
</html>
