<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>注册</title>
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <div class="page auth-page">
    <div class="auth-logo">
      <h1>注册</h1>
      <p style="color: #666; margin-top: 8px;">创建你的账号</p>
    </div>

    <form class="auth-form" id="registerForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label class="form-label">邮箱（选填）</label>
        <input type="email" class="form-input" id="email" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码（至少6位）" required>
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">注册</button>
    </form>

    <div class="auth-footer">
      已有账号？<a href="login.html">立即登录</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    // 已登录直接跳转
    if (Api.isLoggedIn()) {
      location.href = 'mobile.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('registerBtn');
      
      if (!username || !password) {
        showToast('请填写必填信息');
        return;
      }
      
      if (password.length < 6) {
        showToast('密码至少6位');
        return;
      }
      
      if (password !== confirmPassword) {
        showToast('两次密码不一致');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '注册中...';
      
      try {
        const res = await Api.register(username, password, email);
        
        if (res.success || res.user_id) {
          showToast('注册成功');
          setTimeout(() => {
            location.href = 'login.html';
          }, 500);
        } else {
          throw new Error(res.error || '注册失败');
        }
      } catch (e) {
        showToast(e.message || '注册失败');
        btn.disabled = false;
        btn.textContent = '注册';
      }
    });
  </script>
</body>
</html>
