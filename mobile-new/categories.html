<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>分类管理</title>
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    .category-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: white;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .category-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .category-name {
      font-size: 16px;
      font-weight: 500;
    }
    .category-slug {
      font-size: 12px;
      color: #999;
    }
    .category-actions {
      display: flex;
      gap: 8px;
    }
    .category-actions button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }
    .category-actions button.delete {
      color: #ff3b30;
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- 顶部栏 -->
    <header class="header">
      <a href="mobile.html" class="header-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
      <span class="header-title">分类管理</span>
      <button class="header-action" onclick="showAddModal()">添加</button>
    </header>

    <!-- 内容 -->
    <div class="page-content">
      <div class="category-list" id="categoryList">
        <div class="loading">
          <div class="spinner"></div>
          <span>加载中...</span>
        </div>
      </div>
    </div>

    <!-- 底部导航 -->
    <nav class="tabbar">
      <a href="mobile.html" class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>首页</span>
      </a>
      <a href="search.html" class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <span>搜索</span>
      </a>
      <a href="editor.html" class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span>写作</span>
      </a>
      <a href="my.html" class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>我的</span>
      </a>
    </nav>
  </div>

  <!-- 添加/编辑弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">添加分类</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="categoryId">
        <div class="form-group">
          <label class="form-label">分类名称</label>
          <input type="text" class="form-input" id="categoryName" placeholder="例如：技术">
        </div>
        <div class="form-group">
          <label class="form-label">别名（URL用，可选）</label>
          <input type="text" class="form-input" id="categorySlug" placeholder="例如：tech">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCategory()">保存</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    let categories = [];

    document.addEventListener('DOMContentLoaded', async () => {
      // 检查登录
      if (!Api.isLoggedIn()) {
        showToast('请先登录');
        setTimeout(() => location.href = 'login.html', 1000);
        return;
      }
      
      await loadCategories();
    });

    async function loadCategories() {
      const container = document.getElementById('categoryList');
      
      try {
        const res = await Api.getCategories();
        categories = res.data || [];
        
        if (categories.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <p>暂无分类</p>
              <button class="btn btn-outline" style="margin-top: 16px;" onclick="showAddModal()">添加分类</button>
            </div>
          `;
          return;
        }
        
        container.innerHTML = categories.map(cat => `
          <div class="category-card">
            <div class="category-info">
              <span class="category-name">${cat.name}</span>
              ${cat.slug ? `<span class="category-slug">/${cat.slug}</span>` : ''}
            </div>
            <div class="category-actions">
              <button onclick="editCategory(${cat.id})">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="delete" onclick="deleteCategory(${cat.id}, '${cat.name}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = `<div class="error-state"><p>加载失败</p></div>`;
      }
    }

    function showAddModal() {
      document.getElementById('modalTitle').textContent = '添加分类';
      document.getElementById('categoryId').value = '';
      document.getElementById('categoryName').value = '';
      document.getElementById('categorySlug').value = '';
      document.getElementById('modal').classList.add('show');
    }

    function editCategory(id) {
      const cat = categories.find(c => c.id === id);
      if (!cat) return;
      
      document.getElementById('modalTitle').textContent = '编辑分类';
      document.getElementById('categoryId').value = cat.id;
      document.getElementById('categoryName').value = cat.name;
      document.getElementById('categorySlug').value = cat.slug || '';
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    async function saveCategory() {
      const id = document.getElementById('categoryId').value;
      const name = document.getElementById('categoryName').value.trim();
      const slug = document.getElementById('categorySlug').value.trim();
      
      if (!name) {
        showToast('请输入分类名称');
        return;
      }
      
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';
      
      try {
        if (id) {
          await fetch(`${CONFIG.API_BASE}/category/${id}`, {
            method: 'PUT',
            headers: Api.getHeaders(),
            body: JSON.stringify({ name, slug })
          });
        } else {
          await Api.createCategory(name);
        }
        
        showToast('保存成功');
        closeModal();
        await loadCategories();
      } catch (e) {
        showToast(e.message || '保存失败');
      }
      
      btn.disabled = false;
      btn.textContent = '保存';
    }

    async function deleteCategory(id, name) {
      if (!confirm(`确定删除分类 "${name}" 吗？`)) return;
      
      try {
        await Api.deleteCategory(id);
        showToast('删除成功');
        await loadCategories();
      } catch (e) {
        showToast(e.message || '删除失败');
      }
    }
  </script>
</body>
</html>
