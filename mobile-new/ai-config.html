<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 配置</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active">
            <div class="page-header">
                <button class="back-btn" onclick="location.href='mobile.html'">‹ 返回</button>
                <h1 class="page-title">AI 配置</h1>
            </div>
            <div class="content">
                <div class="config-item">
                    <div class="config-label">AI 服务商</div>
                    <select class="form-input" id="ai-provider" style="padding:12px;">
                        <option value="openai">OpenAI</option>
                        <option value="claude">Claude</option>
                        <option value="local">本地模型</option>
                    </select>
                </div>
                <div class="config-item">
                    <div class="config-label">API Key</div>
                    <input type="password" id="api-key" class="form-input" placeholder="请输入 API Key">
                </div>
                <div class="config-item">
                    <div class="config-label">模型选择</div>
                    <select class="form-input" id="ai-model" style="padding:12px;">
                        <option value="gpt-4">GPT-4</option>
                        <option value="gpt-3.5">GPT-3.5</option>
                    </select>
                </div>
                <div style="padding:16px;">
                    <button id="save-btn" class="form-btn">保存配置</button>
                </div>
                <div class="menu-list" style="margin-top:12px;">
                    <div class="menu-item">
                        <span class="menu-icon">🧪</span>
                        <span>测试连接</span>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <span class="menu-icon">💰</span>
                        <span>用量统计</span>
                        <span class="menu-arrow">›</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
    (function() {
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        document.getElementById('save-btn').onclick = () => {
            const provider = document.getElementById('ai-provider').value;
            const apiKey = document.getElementById('api-key').value;
            
            if (!apiKey) {
                showToast('请输入 API Key');
                return;
            }
            
            localStorage.setItem('ai_config', JSON.stringify({ provider, apiKey }));
            showToast('配置已保存');
        };
    })();
    </script>
</body>
</html>
