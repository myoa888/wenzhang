<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>写文章</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active">
            <div class="page-header">
                <button class="back-btn" onclick="location.href='mobile.html'">‹ 返回</button>
                <h1 class="page-title">写文章</h1>
                <button class="header-btn" onclick="saveDraft()">保存</button>
            </div>
            <div class="search-bar">
                <input type="text" id="article-title" class="form-input" placeholder="文章标题" style="font-size:18px;">
            </div>
            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="insertText('# ')">H1</button>
                <button class="toolbar-btn" onclick="insertText('## ')">H2</button>
                <button class="toolbar-btn" onclick="insertText('**')">B</button>
                <button class="toolbar-btn" onclick="insertText('*')">I</button>
                <button class="toolbar-btn" onclick="insertText('\n```\n\n```')">Code</button>
                <button class="toolbar-btn" onclick="insertText('\n- ')">List</button>
                <button class="toolbar-btn" onclick="insertText('\n> ')">Quote</button>
            </div>
            <div class="content" style="padding:0;">
                <textarea id="editor" class="form-input" placeholder="开始写作..." style="border:none;min-height:500px;padding:16px;resize:none;"></textarea>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
    const editor = document.getElementById('editor');

    function insertText(text) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const before = editor.value.substring(0, start);
        const after = editor.value.substring(end);
        editor.value = before + text + after;
        editor.focus();
        editor.selectionStart = editor.selectionEnd = start + text.length;
    }

    function saveDraft() {
        const title = document.getElementById('article-title').value.trim();
        const content = editor.value;
        
        if (!title && !content) {
            alert('内容为空');
            return;
        }

        localStorage.setItem('draft_title', title);
        localStorage.setItem('draft_content', content);
        alert('草稿已保存');
    }

    // 加载草稿
    const draftTitle = localStorage.getItem('draft_title');
    const draftContent = localStorage.getItem('draft_content');
    if (draftTitle) document.getElementById('article-title').value = draftTitle;
    if (draftContent) editor.value = draftContent;
    </script>
</body>
</html>
