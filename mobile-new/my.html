<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active">
            <header class="header">
                <h1 class="header-title">我的</h1>
            </header>
            <div class="content">
                <div id="user-info-panel" style="display:none;">
                    <div class="user-info">
                        <div class="user-avatar">👤</div>
                        <div>
                            <div id="user-name" class="user-name">用户名</div>
                            <div class="user-stats">
                                <span><strong id="user-articles">0</strong> 文章</span>
                                <span><strong id="user-views">0</strong> 阅读</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="login-panel" style="padding:40px 16px;text-align:center;">
                    <p style="color:#8E8E93;margin-bottom:20px;">登录后查看更多功能</p>
                    <a href="login.html" class="form-btn" style="display:inline-block;text-decoration:none;width:auto;padding:14px 40px;">登录 / 注册</a>
                </div>
                <div class="menu-list">
                    <button class="menu-item" onclick="location.href='stats.html'">
                        <span class="menu-icon">📊</span>
                        <span>数据统计</span>
                        <span class="menu-arrow">›</span>
                    </button>
                    <button class="menu-item" onclick="location.href='categories.html'">
                        <span class="menu-icon">📁</span>
                        <span>分类管理</span>
                        <span class="menu-arrow">›</span>
                    </button>
                    <button class="menu-item" onclick="location.href='ai-config.html'">
                        <span class="menu-icon">🤖</span>
                        <span>AI 配置</span>
                        <span class="menu-arrow">›</span>
                    </button>
                    <button class="menu-item" onclick="location.href='ideas.html'">
                        <span class="menu-icon">💡</span>
                        <span>创意管理</span>
                        <span class="menu-arrow">›</span>
                    </button>
                </div>
                <div id="logout-panel" class="menu-list" style="margin-top:12px;display:none;">
                    <button id="logout-btn" class="menu-item" style="color:#FF3B30;">
                        <span class="menu-icon">🚪</span>
                        <span>退出登录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
    (function() {
        const $ = id => document.getElementById(id);

        function checkStatus() {
            const token = localStorage.getItem(Config.STORAGE_KEYS.TOKEN);
            if (token) {
                const user = JSON.parse(localStorage.getItem(Config.STORAGE_KEYS.USER) || '{}');
                $('user-name').textContent = user.username || '用户';
                $('user-articles').textContent = user.articles || 0;
                $('user-views').textContent = user.views || 0;
                $('user-info-panel').style.display = 'block';
                $('login-panel').style.display = 'none';
                $('logout-panel').style.display = 'block';
            }
        }

        $('logout-btn').onclick = () => {
            localStorage.removeItem(Config.STORAGE_KEYS.TOKEN);
            localStorage.removeItem(Config.STORAGE_KEYS.USER);
            location.reload();
        };

        checkStatus();
    })();
    </script>
</body>
</html>
