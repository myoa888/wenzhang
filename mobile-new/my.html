<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>我的</title>
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <div class="page">
    <!-- 用户信息 -->
    <div class="profile-header" id="profileHeader">
      <div class="profile-avatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-name" id="profileName">未登录</div>
      <div class="profile-desc" id="profileDesc">点击登录</div>
    </div>

    <!-- 内容区域 -->
    <div id="loggedInContent" style="display: none;">
      <!-- 统计卡片 -->
      <div class="stats-grid">
        <div class="stats-card" onclick="location.href='my.html?tab=articles'">
          <div class="stats-value" id="articleCount">0</div>
          <div class="stats-label">我的文章</div>
        </div>
        <div class="stats-card" onclick="location.href='categories.html'">
          <div class="stats-value" id="categoryCount">0</div>
          <div class="stats-label">分类</div>
        </div>
      </div>
      
      <!-- 菜单列表 -->
      <div class="menu-list">
        <div class="menu-group">
          <div class="menu-item" onclick="location.href='my.html?tab=articles'">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span class="menu-text">我的文章</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
          <div class="menu-item" onclick="location.href='stats.html'">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 20V10M12 20V4M6 20v-6"/>
            </svg>
            <span class="menu-text">数据统计</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
          <div class="menu-item" onclick="location.href='categories.html'">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span class="menu-text">分类管理</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>
        
        <div class="menu-group">
          <div class="menu-item" onclick="location.href='ai-config.html'">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span class="menu-text">AI 配置</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
          <div class="menu-item" onclick="location.href='ideas.html'">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            <span class="menu-text">创意管理</span>
            <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>
        
        <div class="menu-group">
          <div class="menu-item" onclick="logout()">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span class="menu-text" style="color: var(--danger);">退出登录</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 未登录提示 -->
    <div id="loggedOutContent" class="menu-list">
      <div class="menu-group">
        <div class="menu-item" onclick="location.href='login.html'" style="justify-content: center;">
          <span class="menu-text" style="color: var(--primary); font-weight: 500;">登录 / 注册</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="tabbar">
    <a href="mobile.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>首页</span>
    </a>
    <a href="search.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <span>搜索</span>
    </a>
    <a href="editor.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span>写作</span>
    </a>
    <a href="my.html" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = Api.getUser();
      
      if (user) {
        document.getElementById('loggedInContent').style.display = 'block';
        document.getElementById('loggedOutContent').style.display = 'none';
        document.getElementById('profileName').textContent = user.username || '用户';
        document.getElementById('profileDesc').textContent = user.email || '';
        
        // 加载统计数据
        try {
          const res = await Api.getMyArticles();
          document.getElementById('articleCount').textContent = res.total || 0;
        } catch (e) {}
        
        try {
          const cats = await Api.getCategories();
          document.getElementById('categoryCount').textContent = (cats.data || []).length;
        } catch (e) {}
      } else {
        document.getElementById('loggedInContent').style.display = 'none';
        document.getElementById('loggedOutContent').style.display = 'block';
        document.getElementById('profileHeader').onclick = () => location.href = 'login.html';
      }
    });

    function logout() {
      if (confirm('确定要退出登录吗？')) {
        Api.logout();
      }
    }
  </script>
</body>
</html>
