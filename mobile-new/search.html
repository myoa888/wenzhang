<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>搜索</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active">
            <div class="page-header">
                <h1 class="page-title">搜索</h1>
            </div>
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" class="search-input" placeholder="搜索文章...">
                    <button id="search-btn" class="search-btn">搜索</button>
                </div>
            </div>
            <div class="content">
                <div class="search-history">
                    <div class="search-history-title">
                        <span>搜索历史</span>
                        <button id="clear-history">清空</button>
                    </div>
                    <div id="history-list"></div>
                </div>
                <div id="search-results" class="article-list"></div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
    (function() {
        const $ = id => document.getElementById(id);

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem(Config.STORAGE_KEYS.SEARCH_HISTORY) || '[]');
            const container = $('history-list');
            
            if (history.length === 0) {
                container.innerHTML = '<p style="color:#8E8E93;font-size:14px;">暂无搜索记录</p>';
                return;
            }

            container.innerHTML = history.map(h => 
                `<span class="history-item" onclick="searchFromHistory('${escapeHtml(h)}')">${escapeHtml(h)}</span>`
            ).join('');
        }

        function searchFromHistory(keyword) {
            $('search-input').value = keyword;
            doSearch();
        }

        function doSearch() {
            const keyword = $('search-input').value.trim();
            if (!keyword) {
                showToast('请输入关键词');
                return;
            }

            // 保存历史
            let history = JSON.parse(localStorage.getItem(Config.STORAGE_KEYS.SEARCH_HISTORY) || '[]');
            history = [keyword, ...history.filter(h => h !== keyword)].slice(0, 10);
            localStorage.setItem(Config.STORAGE_KEYS.SEARCH_HISTORY, JSON.stringify(history));

            // 显示结果
            $('history-list').parentElement.style.display = 'none';
            const results = $('search-results');
            results.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div>搜索中...</div></div>';

            // 模拟搜索
            setTimeout(() => {
                results.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>搜索 "${escapeHtml(keyword}" 的结果</p>
                    </div>
                `;
            }, 500);
        }

        $('search-btn').onclick = doSearch;
        $('search-input').onkeypress = e => e.key === 'Enter' && doSearch();
        $('clear-history').onclick = () => {
            localStorage.removeItem(Config.STORAGE_KEYS.SEARCH_HISTORY);
            renderHistory();
        };

        renderHistory();

        // 暴露到全局
        window.searchFromHistory = searchFromHistory;
    })();
    </script>
</body>
</html>
