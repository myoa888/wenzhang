<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文章详情</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active">
            <div class="page-header">
                <button class="back-btn" onclick="history.back()">‹ 返回</button>
                <h1 class="page-title">文章详情</h1>
            </div>
            <div class="content">
                <div class="article-detail">
                    <div class="article-detail-header">
                        <h1 id="article-title" class="article-detail-title"></h1>
                        <div class="article-detail-meta">
                            <span id="article-category" class="article-category"></span>
                            <span id="article-date"></span>
                            <span id="article-views"></span>
                        </div>
                    </div>
                    <div id="article-content" class="article-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
    (function() {
        const $ = (id) => document.getElementById(id);

        function getQueryParam(name) {
            const params = new URLSearchParams(location.search);
            return params.get(name);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadArticle() {
            const id = getQueryParam('id');
            if (!id) {
                $('article-content').innerHTML = '<div class="error-state">文章不存在</div>';
                return;
            }

            // 模拟文章数据
            const articles = {
                1: { title: 'JavaScript 高级技巧总结', category: '技术', date: '2024-01-15', views: 1250, content: '深入理解闭包、原型链、异步编程等核心概念...' },
                2: { title: '移动端开发最佳实践', category: '技术', date: '2024-01-14', views: 890, content: '从响应式设计到性能优化，全面提升移动端体验...' }
            };

            const article = articles[id] || { title: '示例文章', category: '默认', date: '2024-01-01', views: 100, content: '这是文章内容...' };

            $('article-title').textContent = article.title;
            $('article-category').textContent = article.category;
            $('article-date').textContent = formatDate(article.date);
            $('article-views').textContent = article.views + ' 阅读';
            $('article-content').innerHTML = `<p>${escapeHtml(article.content)}</p><p>完整内容将在实际API接入后显示。</p>`;
        }

        loadArticle();
    })();
    </script>
</body>
</html>
