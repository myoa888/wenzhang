<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数据统计</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active">
            <div class="page-header">
                <button class="back-btn" onclick="location.href='mobile.html'">‹ 返回</button>
                <h1 class="page-title">数据统计</h1>
            </div>
            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-articles">0</div>
                        <div class="stat-label">文章总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-views">0</div>
                        <div class="stat-label">总阅读量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-likes">0</div>
                        <div class="stat-label">获赞数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-followers">0</div>
                        <div class="stat-label">关注者</div>
                    </div>
                </div>
                <div class="menu-list" style="margin-top:12px;">
                    <div class="menu-item">
                        <span class="menu-icon">📈</span>
                        <span>本周数据</span>
                        <span class="menu-arrow" style="color:#34C759;">+12% ↑</span>
                    </div>
                    <div class="menu-item">
                        <span class="menu-icon">🔥</span>
                        <span>热门文章</span>
                        <span class="menu-arrow">›</span>
                    </div>
                    <div class="menu-item">
                        <span class="menu-icon">📊</span>
                        <span>导出报告</span>
                        <span class="menu-arrow">›</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
    (function() {
        // 模拟数据
        const stats = {
            articles: 12,
            views: 5678,
            likes: 234,
            followers: 56
        };

        document.getElementById('stat-articles').textContent = stats.articles;
        document.getElementById('stat-views').textContent = stats.views;
        document.getElementById('stat-likes').textContent = stats.likes;
        document.getElementById('stat-followers').textContent = stats.followers;
    })();
    </script>
</body>
</html>
