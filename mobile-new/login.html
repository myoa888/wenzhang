<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>登录</title>
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <div class="page auth-page">
    <div class="auth-logo">
      <h1>文章</h1>
      <p style="color: #666; margin-top: 8px;">记录你的想法</p>
    </div>

    <form class="auth-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
    </form>

    <div class="auth-footer">
      还没有账号？<a href="register.html">立即注册</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    // 已登录直接跳转
    if (Api.isLoggedIn()) {
      location.href = 'mobile.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      
      if (!username || !password) {
        showToast('请填写完整信息');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '登录中...';
      
      try {
        const res = await Api.login(username, password);
        
        if (res.success || res.token) {
          localStorage.setItem('token', res.token || res.data?.token);
          localStorage.setItem('user', JSON.stringify(res.user || res.data?.user));
          showToast('登录成功');
          setTimeout(() => {
            location.href = 'mobile.html';
          }, 500);
        } else {
          throw new Error(res.error || '登录失败');
        }
      } catch (e) {
        showToast(e.message || '登录失败');
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
