<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登录</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <div class="page active" style="padding-top: 60px;">
            <div style="text-align: center; padding: 40px 20px;">
                <div style="font-size: 64px; margin-bottom: 20px;">📝</div>
                <h1 style="font-size: 24px; font-weight: 600; margin-bottom: 8px;">欢迎回来</h1>
                <p style="color: #8E8E93; margin-bottom: 40px;">登录你的账户继续</p>
            </div>
            <div style="padding: 0 20px;">
                <div class="form-group">
                    <input type="text" id="username" class="form-input" placeholder="用户名或邮箱">
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-input" placeholder="密码">
                </div>
                <button id="login-btn" class="form-btn">登录</button>
                <p class="form-link">
                    还没有账户？<a href="register.html" style="color: #007AFF; text-decoration: none;">立即注册</a>
                </p>
                <p style="text-align: center; margin-top: 20px;">
                    <a href="mobile.html" style="color: #8E8E93; text-decoration: none; font-size: 14px;">‹ 返回首页</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
    (function() {
        const $ = id => document.getElementById(id);

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        $('login-btn').onclick = async () => {
            const username = $('username').value.trim();
            const password = $('password').value;

            if (!username || !password) {
                showToast('请填写完整信息');
                return;
            }

            // 模拟登录
            const btn = $('login-btn');
            btn.disabled = true;
            btn.textContent = '登录中...';

            setTimeout(() => {
                localStorage.setItem(Config.STORAGE_KEYS.TOKEN, 'mock_token_123');
                localStorage.setItem(Config.STORAGE_KEYS.USER, JSON.stringify({
                    username,
                    articles: 5,
                    views: 1234
                }));
                showToast('登录成功');
                setTimeout(() => location.href = 'mobile.html', 1000);
            }, 1000);
        };
    })();
    </script>
</body>
</html>
