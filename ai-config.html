<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 配置管理</title>
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/spa.css">
  <style>
    body { background: #f5f7fa; padding-top: 48px; }
    
    .content { padding: 16px; }
    
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      overflow: hidden;
    }
    
    .card-header {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header h2 { margin: 0; font-size: 16px; }
    
    .config-list { padding: 0; }
    
    .config-item {
      padding: 16px;
      border-bottom: 1px solid #f5f5f5;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .config-item:hover { background: #fafafa; }
    .config-item:last-child { border-bottom: none; }
    
    .config-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #409eff, #66b1ff);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .config-icon.default {
      background: linear-gradient(135deg, #67c23a, #85ce61);
    }
    
    .config-info { flex: 1; min-width: 0; }
    .config-name {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .config-model {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .config-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-default {
      background: #f0f9eb;
      color: #67c23a;
    }
    .badge-custom {
      background: #ecf5ff;
      color: #409eff;
    }
    
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #999;
    }
    .empty-state svg { width: 60px; height: 60px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { margin: 0 0 16px 0; }
    
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #409eff, #66b1ff);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline {
      background: #fff;
      color: #666;
      border: 1px solid #e0e0e0;
    }
    .btn-danger {
      background: linear-gradient(135deg, #f56c6c, #f78989);
      color: #fff;
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    /* 表单弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-overlay.show { display: flex; }
    
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { margin: 0; font-size: 17px; }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
    }
    
    .modal-body { padding: 16px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #409eff;
    }
    
    .slider-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #e0e0e0;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #409eff;
      cursor: pointer;
    }
    .slider-value {
      min-width: 30px;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: #409eff;
    }
    
    .modal-footer {
      padding: 16px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }
    .modal-footer .btn { flex: 1; text-align: center; }
    
    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #f0f0f0;
      border-top-color: #409eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .model-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .model-item {
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .model-item:hover { border-color: #409eff; }
    .model-item.selected {
      border-color: #409eff;
      background: #ecf5ff;
    }
    .model-item .name { font-size: 12px; font-weight: 600; }
    .model-item .desc { font-size: 10px; color: #999; }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="back-btn" onclick="history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
    </button>
    <h1>🤖 AI 配置管理</h1>
  </header>

  <div class="content">
    <div id="app">
      <div class="loading">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
    </div>
  </div>

  <!-- 新建/编辑弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">新建配置</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="configId">
        
        <div class="form-group">
          <label class="form-label">配置名称</label>
          <input type="text" class="form-input" id="configName" placeholder="例如：DeepSeek V3">
        </div>
        
        <div class="form-group">
          <label class="form-label">选择模型</label>
          <div class="model-grid" id="modelGrid"></div>
          <input type="hidden" id="selectedModel">
        </div>
        
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input type="password" class="form-input" id="apiKey" placeholder="sk-...">
        </div>
        
        <div class="form-group">
          <label class="form-label">API 地址</label>
          <input type="text" class="form-input" id="apiBase" placeholder="https://api.siliconflow.cn/v1">
        </div>
        
        <div class="form-group">
          <label class="form-label">Temperature（创造性）</label>
          <div class="slider-group">
            <span style="font-size:11px;color:#999;">保守</span>
            <input type="range" class="slider" id="temperature" min="0.1" max="1" step="0.1" value="0.7" oninput="document.getElementById('tempValue').textContent = this.value">
            <span style="font-size:11px;color:#999;">创意</span>
            <span class="slider-value" id="tempValue">0.7</span>
          </div>
        </div>
        
        <div class="form-group checkbox-group">
          <input type="checkbox" id="isDefault">
          <label for="isDefault">设为默认配置</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const MODELS = [
      { id: 'deepseek-ai/DeepSeek-V3', name: 'DeepSeek V3', desc: '最新强大' },
      { id: 'deepseek-ai/DeepSeek-R1', name: 'DeepSeek R1', desc: '深度思考' },
      { id: 'Qwen/Qwen2.5-72B-Instruct', name: 'Qwen 2.5 72B', desc: '通义千问' },
      { id: 'Anthropic/claude-3.5-sonnet', name: 'Claude 3.5', desc: 'Anthropic' },
      { id: 'google/gemini-pro', name: 'Gemini Pro', desc: 'Google' },
      { id: 'openai/gpt-4o-mini', name: 'GPT-4o mini', desc: 'OpenAI' }
    ];

    let configs = [];
    let editingId = null;

    document.addEventListener('DOMContentLoaded', loadConfigs);

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function loadConfigs() {
      try {
        const res = await api.get('/ai/config');
        configs = res.data || [];
        renderList();
      } catch (e) {
        document.getElementById('app').innerHTML = `
          <div class="empty-state">
            <p>加载失败，请稍后重试</p>
            <button class="btn btn-primary" onclick="loadConfigs()">重新加载</button>
          </div>
        `;
      }
    }

    function renderList() {
      const app = document.getElementById('app');
      
      if (configs.length === 0) {
        app.innerHTML = `
          <div class="card">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <p>还没有 AI 配置</p>
              <button class="btn btn-primary" onclick="openModal()">新建配置</button>
            </div>
          </div>
        `;
        return;
      }

      app.innerHTML = `
        <div class="card">
          <div class="card-header">
            <h2>我的配置（${configs.length}）</h2>
            <button class="btn btn-primary btn-sm" onclick="openModal()">+ 新建</button>
          </div>
          <div class="config-list">
            ${configs.map(c => `
              <div class="config-item" data-id="${c.id}">
                <div class="config-icon ${c.is_default ? 'default' : ''}" onclick="setDefault(${c.id})">
                  ${c.is_default ? '⭐' : '🤖'}
                </div>
                <div class="config-info" onclick="editConfig(${c.id})">
                  <div class="config-name">${escapeHtml(c.name)}</div>
                  <div class="config-model">${escapeHtml(c.model)}</div>
                </div>
                ${c.is_default 
                  ? `<span class="config-badge badge-default">默认</span>` 
                  : `<button class="btn btn-sm" onclick="setDefault(${c.id})" style="background:#ecf5ff;color:#409eff;border:none;">设默认</button>`
                }
                <button class="btn btn-sm" onclick="deleteConfig(${c.id})" style="background:#fef0f0;color:#f56c6c;border:none;margin-left:4px;">删除</button>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="card" style="padding: 16px; color: #999; font-size: 12px;">
          💡 点击配置名称编辑 | 点击🤖设为默认 | 点击删除移除
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function openModal(id = null) {
      editingId = id;
      document.getElementById('modalTitle').textContent = id ? '编辑配置' : '新建配置';
      document.getElementById('saveBtn').textContent = id ? '更新' : '创建';
      
      // 渲染模型选择
      renderModelGrid(id ? configs.find(c => c.id === id)?.model : MODELS[0].id);
      
      if (id) {
        const cfg = configs.find(c => c.id === id);
        document.getElementById('configId').value = id;
        document.getElementById('configName').value = cfg.name;
        document.getElementById('apiKey').value = cfg.api_key;
        document.getElementById('apiBase').value = cfg.api_base || '';
        document.getElementById('temperature').value = cfg.temperature;
        document.getElementById('tempValue').textContent = cfg.temperature;
        document.getElementById('isDefault').checked = cfg.is_default;
      } else {
        document.getElementById('configId').value = '';
        document.getElementById('configName').value = '';
        document.getElementById('apiKey').value = '';
        document.getElementById('apiBase').value = 'https://api.siliconflow.cn/v1';
        document.getElementById('temperature').value = 0.7;
        document.getElementById('tempValue').textContent = '0.7';
        document.getElementById('isDefault').checked = configs.length === 0;
      }
      
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      editingId = null;
    }

    function renderModelGrid(selectedId) {
      const grid = document.getElementById('modelGrid');
      document.getElementById('selectedModel').value = selectedId;
      
      grid.innerHTML = MODELS.map(m => `
        <div class="model-item ${selectedId === m.id ? 'selected' : ''}" onclick="selectModel('${m.id}')">
          <div class="name">${m.name}</div>
          <div class="desc">${m.desc}</div>
        </div>
      `).join('');
    }

    function selectModel(modelId) {
      document.getElementById('selectedModel').value = modelId;
      renderModelGrid(modelId);
    }

    function editConfig(id) {
      openModal(id);
    }

    async function saveConfig() {
      const id = document.getElementById('configId').value;
      const name = document.getElementById('configName').value.trim();
      const model = document.getElementById('selectedModel').value;
      const apiKey = document.getElementById('apiKey').value.trim();
      const apiBase = document.getElementById('apiBase').value.trim();
      const temperature = parseFloat(document.getElementById('temperature').value);
      const isDefault = document.getElementById('isDefault').checked;

      if (!name) {
        showToast('请输入配置名称');
        return;
      }
      if (!model) {
        showToast('请选择模型');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      try {
        let res;
        if (id) {
          res = await api.post('/ai/config/update', { id, name, provider: 'siliconflow', model, api_key: apiKey, api_base: apiBase, temperature, max_tokens: 2000 });
        } else {
          res = await api.post('/ai/config', { name, provider: 'siliconflow', model, api_key: apiKey, api_base: apiBase, temperature, max_tokens: 2000, is_default: isDefault || configs.length === 0 });
        }
        
        showToast(res.message || '保存成功');
        closeModal();
        await loadConfigs();
      } catch (e) {
        showToast(e.error || '保存失败');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = id ? '更新' : '创建';
      }
    }

    async function setDefault(id) {
      try {
        await api.post('/ai/config/default', { id });
        showToast('已设为默认配置');
        await loadConfigs();
      } catch (e) {
        showToast(e.error || '设置失败');
      }
    }

    async function deleteConfig(id) {
      if (!confirm('确定要删除这个配置吗？')) return;
      
      try {
        await api.post('/ai/config/delete', { id });
        showToast('已删除');
        await loadConfigs();
      } catch (e) {
        showToast(e.error || '删除失败');
      }
    }

  </script>
</body>
</html>
