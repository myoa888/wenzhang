<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 配置 - 自媒体助手</title>
  <link rel="stylesheet" href="css/mobile.css">
  <style>
    body { background: #f5f7fa; }
    
    .config-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 24px 16px;
      text-align: center;
    }
    .config-header h1 { margin: 0 0 8px 0; font-size: 20px; }
    .config-header p { margin: 0; opacity: 0.8; font-size: 13px; }
    
    .config-card {
      background: #fff;
      border-radius: 16px;
      margin: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    
    .config-section {
      padding: 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .config-section:last-child { border-bottom: none; }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title svg { width: 18px; height: 18px; }
    
    .model-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .model-item {
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .model-item:hover { border-color: #409eff; }
    .model-item.selected {
      border-color: #409eff;
      background: #ecf5ff;
    }
    .model-item .name { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
    .model-item .desc { font-size: 11px; color: #999; }
    .model-item .badge {
      display: inline-block;
      background: #67c23a;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
    }
    
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #409eff;
    }
    .form-input:disabled {
      background: #f5f7fa;
      color: #999;
    }
    .form-hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
    
    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #e0e0e0;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #409eff;
      cursor: pointer;
    }
    .slider-value {
      min-width: 40px;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: #409eff;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #409eff, #66b1ff);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      background: #fff;
      color: #666;
      border: 1px solid #e0e0e0;
      margin-top: 10px;
    }
    
    .status-bar {
      padding: 10px 16px;
      background: #f0f9ff;
      border-radius: 10px;
      margin: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #409eff;
    }
    .status-bar svg { width: 16px; height: 16px; }
    .status-bar.success { background: #f0f9eb; color: #67c23a; }
    .status-bar.error { background: #fef0f0; color: #f56c6c; }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top-color: #409eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading span { color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <div id="app">
    <header class="page-header">
      <button class="back-btn" onclick="history.back()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>
      <h1>AI 配置</h1>
    </header>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span>加载中...</span>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    let config = null;
    
    // 可用模型列表
    const MODELS = [
      { id: 'deepseek-ai/DeepSeek-V3', name: 'DeepSeek V3', desc: '最新强大模型', badge: '推荐' },
      { id: 'deepseek-ai/DeepSeek-R1', name: 'DeepSeek R1', desc: '深度思考模型', badge: '' },
      { id: 'Qwen/Qwen2.5-72B-Instruct', name: 'Qwen 2.5 72B', desc: '阿里通义千问', badge: '' },
      { id: 'Anthropic/claude-3.5-sonnet', name: 'Claude 3.5', desc: 'Anthropic模型', badge: '' },
      { id: 'google/gemini-pro', name: 'Gemini Pro', desc: 'Google模型', badge: '' }
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      await loadConfig();
    });

    async function loadConfig() {
      try {
        const res = await api.get('/ai/config');
        config = res.data;
        renderConfig(config);
      } catch (e) {
        document.getElementById('content').innerHTML = `
          <div class="config-header">
            <h1>AI 配置</h1>
            <p>设置你的 AI 服务</p>
          </div>
          <div class="status-bar error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            加载失败，请稍后重试
          </div>
          <div style="padding: 16px;">
            <button class="btn btn-outline" onclick="loadConfig()">重新加载</button>
          </div>
        `;
      }
    }

    function renderConfig(cfg) {
      const isDefault = cfg.is_default;
      
      document.getElementById('content').innerHTML = `
        <div class="config-header">
          <h1>🤖 AI 配置</h1>
          <p>自定义 AI 生成服务</p>
        </div>
        
        ${isDefault ? `
        <div class="status-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
            <line x1="9" y1="9" x2="9.01" y2="9"></line>
            <line x1="15" y1="9" x2="15.01" y2="9"></line>
          </svg>
          使用系统默认配置（内置免费额度）
        </div>
        ` : `
        <div class="status-bar success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
            <line x1="9" y1="9" x2="9.01" y2="9"></line>
            <line x1="15" y1="9" x2="15.01" y2="9"></line>
          </svg>
          已配置自定义 AI（${cfg.api_key || 'Key已设置'}）
        </div>
        `}
        
        <div class="config-card">
          <div class="config-section">
            <div class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="#409eff" stroke-width="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
              选择 AI 模型
            </div>
            <div class="model-grid">
              ${MODELS.map(m => `
                <div class="model-item ${cfg.model === m.id ? 'selected' : ''}" onclick="selectModel('${m.id}')">
                  <div class="name">${m.name}</div>
                  <div class="desc">${m.desc}</div>
                  ${m.badge ? `<span class="badge">${m.badge}</span>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
          
          <div class="config-section">
            <div class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="#67c23a" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              API Key 设置
            </div>
            <div class="form-group">
              <label class="form-label">SiliconFlow API Key</label>
              <input type="password" class="form-input" id="apiKey" placeholder="sk-..." value="${isDefault ? '' : cfg.api_key}">
              <div class="form-hint">
                ${isDefault ? '系统已内置免费 Key，可直接使用' : '留空则使用内置免费 Key'}
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">API 地址（可选）</label>
              <input type="text" class="form-input" id="apiBase" placeholder="https://api.siliconflow.cn/v1" value="${cfg.api_base}">
              <div class="form-hint">通常不需要修改</div>
            </div>
          </div>
          
          <div class="config-section">
            <div class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="#e6a23c" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
              生成参数
            </div>
            <div class="form-group">
              <label class="form-label">Temperature（创造性）</label>
              <div class="slider-group">
                <span style="font-size:11px;color:#999;">保守</span>
                <input type="range" class="slider" id="temperature" min="0.1" max="1" step="0.1" value="${cfg.temperature}" oninput="updateSliderValue('temp', this.value)">
                <span style="font-size:11px;color:#999;">创意</span>
                <span class="slider-value" id="tempValue">${cfg.temperature}</span>
              </div>
              <div class="form-hint">值越高生成越有创意，越低越保守</div>
            </div>
          </div>
        </div>
        
        <div style="padding: 0 16px 16px;">
          <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()">保存配置</button>
          ${!isDefault ? `
          <button class="btn btn-outline" onclick="resetConfig()">重置为默认配置</button>
          ` : ''}
        </div>
      `;
    }
    
    let selectedModel = config?.model || 'deepseek-ai/DeepSeek-V3';
    
    function selectModel(modelId) {
      selectedModel = modelId;
      document.querySelectorAll('.model-item').forEach(item => {
        item.classList.toggle('selected', item.querySelector('.name').textContent === MODELS.find(m => m.id === modelId)?.name);
      });
      // 简化匹配
      document.querySelectorAll('.model-item').forEach(item => {
        const isSelected = item.getAttribute('onclick')?.includes(modelId);
        if (isSelected) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });
    }
    
    function updateSliderValue(id, value) {
      document.getElementById(id + 'Value').textContent = value;
    }
    
    async function saveConfig() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';
      
      try {
        const apiKey = document.getElementById('apiKey').value.trim();
        const apiBase = document.getElementById('apiBase').value.trim();
        const temperature = parseFloat(document.getElementById('temperature').value);
        
        await api.post('/ai/config', {
          provider: 'siliconflow',
          model: selectedModel,
          api_key: apiKey || null,
          api_base: apiBase || 'https://api.siliconflow.cn/v1',
          temperature: temperature
        });
        
        alert('配置保存成功！');
        await loadConfig();
      } catch (e) {
        alert('保存失败: ' + (e.error || '请重试'));
      } finally {
        btn.disabled = false;
        btn.textContent = '保存配置';
      }
    }
    
    async function resetConfig() {
      if (!confirm('确定要重置为默认配置吗？')) return;
      
      try {
        await api.delete('/ai/config');
        alert('已重置为默认配置');
        await loadConfig();
      } catch (e) {
        alert('重置失败: ' + (e.error || '请重试'));
      }
    }
  </script>
</body>
</html>
