<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">文章</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">首页</a>
        <a href="search.html" class="nav-link">搜索</a>
        <a href="login.html" class="nav-link" id="loginLink">登录</a>
        <a href="manage.html" class="nav-link" id="manageLink" style="display:none">管理</a>
      </nav>
    </div>
  </header>

  <main class="main article-page">
    <div class="container">
      <article class="article-detail" id="articleDetail">
        <div class="loading">加载中...</div>
      </article>

      <!-- 审核操作栏（仅管理员可见） -->
      <div class="review-bar" id="reviewBar" style="display:none;padding:16px;background:#fff3cd;border-radius:8px;margin-bottom:20px;">
        <span style="font-weight:600;">待审核文章</span>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button onclick="reviewArticle('approve')" class="btn btn-primary">✅ 通过发布</button>
          <button onclick="reviewArticle('reject')" class="btn btn-outline">❌ 退回修改</button>
          <button onclick="fixArticle()" class="btn btn-outline">🤖 AI修复</button>
        </div>
      </div>

      <!-- 评论区域 -->
      <section class="comments-section" id="commentsSection" style="display:none">
        <h3 class="comments-title">评论/反馈 <span id="commentCount">0</span></h3>

        <!-- 发表评论 -->
        <div class="comment-form" id="commentForm">
          <div id="issueTypeSection" style="margin-bottom:12px;">
            <label style="font-size:13px;color:#666;display:block;margin-bottom:6px;">问题类型（可选）：</label>
            <div class="issue-types-grid">
              <label class="issue-type-option">
                <input type="radio" name="issueType" value=""> <span>普通评论</span>
              </label>
              <label class="issue-type-option">
                <input type="radio" name="issueType" value="text_error"> <span>📝 文字问题</span>
              </label>
              <label class="issue-type-option">
                <input type="radio" name="issueType" value="image_error"> <span>🖼️ 图片问题</span>
              </label>
              <label class="issue-type-option">
                <input type="radio" name="issueType" value="logic_error"> <span>🧠 逻辑问题</span>
              </label>
              <label class="issue-type-option">
                <input type="radio" name="issueType" value="style_error"> <span>✨ 风格问题</span>
              </label>
            </div>
          </div>
          <textarea id="commentContent" class="form-textarea" rows="3" placeholder="发表评论或指出文章中的问题..."></textarea>
          <div class="comment-form-actions">
            <button onclick="submitComment()" class="btn btn-primary">发表评论</button>
          </div>
        </div>

        <!-- 评论列表 -->
        <div class="comments-list" id="commentsList">
          <div class="loading">加载评论中...</div>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true
    });

    let currentArticleId = null;
    let currentUser = null;
    let currentArticle = null;

    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const slug = params.get('slug');
      const identifier = id || slug;
      
      if (!identifier) {
        document.getElementById('articleDetail').innerHTML = '<div class="error">文章不存在</div>';
        return;
      }

      try {
        const res = await api.getArticle(identifier);
        if (res.success) {
          renderArticle(res.data);
          document.title = res.data.title + ' - 文章';
          currentArticleId = res.data.id;
          currentArticle = res.data;
          // 显示审核栏（如果是待审核状态且已登录）
          if (res.data.status === 'pending_review' && currentUser) {
            document.getElementById('reviewBar').style.display = '';
          }
          // 显示评论区域并加载评论
          document.getElementById('commentsSection').style.display = '';
          loadComments(currentArticleId);
        } else {
          document.getElementById('articleDetail').innerHTML = '<div class="error">' + res.error + '</div>';
        }
      } catch (e) {
        document.getElementById('articleDetail').innerHTML = '<div class="error">加载失败</div>';
      }
    }

    function renderArticle(article) {
      const html = `
        <header class="article-header">
          <div class="article-meta">
            <span class="category-tag">${article.category_name || '未分类'}</span>
            <span class="date">${formatDate(article.created_at)}</span>
            <span class="views"> ${article.view_count}</span>
          </div>
          <h1 class="article-title">${article.title}</h1>
          <div class="article-author">
            <span> ${article.author_name}</span>
          </div>
          ${article.tags && article.tags.length > 0 ? `
            <div class="article-tags">
              ${article.tags.map(t => `<span class="tag">${t.name}</span>`).join('')}
            </div>
          ` : ''}
        </header>
        <div class="article-content markdown-body">
          ${marked.parse(article.content)}
        </div>
        <footer class="article-footer">
          <a href="index.html" class="btn">返回列表</a>
        </footer>
      `;
      document.getElementById('articleDetail').innerHTML = html;
    }

    // 加载评论
    async function loadComments(articleId) {
      try {
        const res = await api.getComments(articleId);
        const comments = res.success ? (res.data || []) : [];
        document.getElementById('commentCount').textContent = comments.length;
        renderComments(comments);
      } catch (e) {
        document.getElementById('commentsList').innerHTML = '<div class="error">评论加载失败</div>';
      }
    }

    // 渲染评论列表
    function renderComments(comments) {
      const container = document.getElementById('commentsList');
      if (!comments || comments.length === 0) {
        container.innerHTML = '<div class="empty">暂无评论，来写第一条吧！</div>';
        return;
      }
      container.innerHTML = comments.map(c => `
        <div class="comment-item ${c.issue_type ? 'has-issue' : ''}" data-id="${c.id}">
          <div class="comment-header">
            <span class="comment-author">${c.username || '匿名'}</span>
            <span class="comment-date">${formatDate(c.created_at)}</span>
            ${c.issue_type ? `<span class="issue-tag ${c.issue_type}">${getIssueLabel(c.issue_type)}</span>` : ''}
            ${c.fixed ? '<span class="fixed-tag">✅ 已修复</span>' : ''}
            ${currentUser && currentUser.id == c.user_id ? `
              <button onclick="deleteComment(${c.id})" class="btn btn-sm btn-danger comment-delete">删除</button>
            ` : ''}
          </div>
          <div class="comment-body">${escapeHtml(c.content)}</div>
        </div>
      `).join('');
    }

    function getIssueLabel(type) {
      const map = {
        'text_error': '📝 文字问题',
        'image_error': '🖼️ 图片问题',
        'logic_error': '🧠 逻辑问题',
        'style_error': '✨ 风格问题',
        'other': '❓ 其他问题'
      };
      return map[type] || type;
    }

    // 提交评论
    async function submitComment() {
      const content = document.getElementById('commentContent').value.trim();
      if (!content) {
        alert('评论内容不能为空');
        return;
      }
      if (!currentArticleId) return;
      if (!currentUser) {
        alert('请先登录');
        window.location.href = 'login.html';
        return;
      }

      const issueType = document.querySelector('input[name="issueType"]:checked')?.value || '';

      try {
        const res = await api.createComment({
          article_id: currentArticleId,
          content: content,
          issue_type: issueType || undefined
        });
        if (res.success) {
          document.getElementById('commentContent').value = '';
          // 重置问题类型选择
          document.querySelectorAll('input[name="issueType"]').forEach(r => r.checked = false);
          // 如果标记了问题，显示提示
          if (issueType) {
            alert('问题已标记，AI将自动修复这篇文稿');
            // 刷新文章状态
            loadArticle();
          }
          loadComments(currentArticleId);
        } else {
          alert(res.error || '评论发表失败');
        }
      } catch (e) {
        alert('评论发表失败，请重试');
      }
    }

    // 审核文章
    async function reviewArticle(action) {
      if (!currentArticleId) return;
      try {
        const res = await api.reviewArticle(currentArticleId, action);
        if (res.success) {
          alert(action === 'approve' ? '文章已发布！' : '文章已退回修改');
          document.getElementById('reviewBar').style.display = 'none';
          loadArticle();
        } else {
          alert(res.error || '操作失败');
        }
      } catch (e) {
        alert('操作失败');
      }
    }

    // AI修复文章
    async function fixArticle() {
      if (!currentArticleId) return;
      if (!confirm('确定让AI修复文章中的问题吗？')) return;
      try {
        const res = await api.fixArticle({ article_id: currentArticleId });
        if (res.success) {
          alert('AI已开始修复，请稍后刷新页面查看结果');
          loadArticle();
        } else {
          alert(res.error || '修复失败');
        }
      } catch (e) {
        alert('修复失败');
      }
    }

    // 删除评论
    async function deleteComment(commentId) {
      if (!confirm('确定要删除这条评论吗？')) return;
      try {
        const res = await api.deleteComment(commentId);
        if (res.success) {
          loadComments(currentArticleId);
        } else {
          alert(res.error || '删除失败');
        }
      } catch (e) {
        alert('删除失败，请重试');
      }
    }

    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    async function checkAuth() {
      const token = localStorage.getItem('token');
      if (!token) {
        document.getElementById('commentForm').style.display = 'none';
        return;
      }
      try {
        const res = await api.getUser();
        if (res && res.id) {
          currentUser = res;
          document.getElementById('loginLink').style.display = 'none';
          document.getElementById('manageLink').style.display = '';
        }
      } catch (e) {
        document.getElementById('commentForm').style.display = 'none';
      }
    }

    checkAuth();
    loadArticle();
    loadFooter();
  </script>
</body>
</html>
