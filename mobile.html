<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>资讯</title>
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/spa.css">
</head>
<body>
  <div id="app">
    <!-- 页面容器 -->
    <div id="page-container"></div>
    
    <!-- 底部 Tabbar -->
    <nav class="tabbar" id="tabbar">
      <a href="#home" class="tab-item active" data-tab="home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>首页</span>
      </a>
      <a href="#ideas" class="tab-item" data-tab="ideas">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="2" x2="12" y2="6"></line>
          <line x1="12" y1="18" x2="12" y2="22"></line>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
          <line x1="2" y1="12" x2="6" y2="12"></line>
          <line x1="18" y1="12" x2="22" y2="12"></line>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
        </svg>
        <span>创意</span>
      </a>
      <a href="#tasks" class="tab-item" data-tab="tasks">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"></path>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        <span>待办</span>
        <span class="tab-badge" id="taskBadge" style="display:none;">0</span>
      </a>
      <a href="#my" class="tab-item" data-tab="my">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>我的</span>
      </a>
    </nav>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/ideas.js"></script>
  <script src="js/pages/tasks.js"></script>
  <script src="js/pages/my.js"></script>
  <script>
    // TasksPage 全局访问
    window.TasksPage = TasksPage;
  </script>
  <script>
    // 初始化应用
    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      
      // 更新待办角标
      updateTaskBadge();
    });

    // 更新待办角标
    async function updateTaskBadge() {
      if (!api.getToken()) return;
      try {
        const res = await api.get('/tasks?status=pending');
        const count = res?.length || 0;
        const badge = document.getElementById('taskBadge');
        if (count > 0) {
          badge.textContent = count > 99 ? '99+' : count;
          badge.style.display = 'block';
        } else {
          badge.style.display = 'none';
        }
      } catch (e) {}
    }

    // 全局跳转
    window.Tasks = { toggle: TasksPage.toggle };
  </script>
</body>
</html>
